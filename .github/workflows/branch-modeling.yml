name: Branch Modeling

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - closed

permissions:
  contents: write

jobs:
  validate-branch-name:
    name: Validate branch name
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Check source branch
        run: |
          BRANCH_NAME="${{ github.head_ref }}"

          if [[ ! "$BRANCH_NAME" =~ ^(feature|hotFix|bugFix)/.+$ ]]; then
            echo "Invalid branch name: $BRANCH_NAME"
            echo "Branch names must start with feature/, hotFix/, or bugFix/."
            exit 1
          fi

          echo "Valid branch name: $BRANCH_NAME"

  delete-merged-branch:
    name: Delete merged branch
    if: github.event.pull_request.merged == true && github.head_ref != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Delete source branch
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const headRepo = context.payload.pull_request.head.repo.full_name;
            const baseRepo = context.payload.repository.full_name;

            if (branchName === 'main') {
              core.info('Skipping main branch.');
              return;
            }

            if (headRepo !== baseRepo) {
              core.info(`Skipping branch from fork: ${headRepo}:${branchName}`);
              return;
            }

            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branchName}`,
            });

            core.info(`Deleted branch: ${branchName}`);
